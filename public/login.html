<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - TechStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <div class="brand-icon">⚡</div>
    Tech<span>Store</span>
  </a>
  <div class="navbar-actions">
    <a href="/register" class="btn-nav-auth" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary)">Đăng ký</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div style="font-size:48px;margin-bottom:12px">👋</div>
      <h1>Chào mừng trở lại</h1>
      <p>Đăng nhập để tiếp tục mua sắm</p>
    </div>

    <div id="error-msg" class="hidden" style="background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);border-radius:8px;padding:12px 16px;font-size:14px;color:var(--danger);margin-bottom:20px"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="email" placeholder="your@email.com" onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <div class="form-group">
      <label class="form-label">Mật khẩu</label>
      <div style="position:relative">
        <input type="password" class="form-control" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
        <button onclick="togglePwd('password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px">👁</button>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
      <a href="#" style="font-size:13px;color:var(--accent)">Quên mật khẩu?</a>
    </div>

    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">
      Đăng nhập
    </button>

    <div class="auth-divider">hoặc</div>

    <div style="display:grid;gap:10px;margin-bottom:18px">
      <button onclick="doSignInGoogle()" type="button" style="
        display:flex;align-items:center;justify-content:center;gap:10px;
        width:100%;padding:11px 16px;border-radius:9px;cursor:pointer;
        background:#fff;border:1.5px solid #dadce0;color:#3c4043;
        font-size:14px;font-weight:500;transition:box-shadow 0.2s;
      " onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,0.2)'"
         onmouseout="this.style.boxShadow='none'">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Đăng nhập bằng Google
      </button>
      <button onclick="doSignInFacebook()" type="button" style="
        display:flex;align-items:center;justify-content:center;gap:10px;
        width:100%;padding:11px 16px;border-radius:9px;cursor:pointer;
        background:#1877f2;border:none;color:#fff;
        font-size:14px;font-weight:500;transition:opacity 0.2s;
      " onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Đăng nhập bằng Facebook
      </button>
    </div>

    <!-- Demo credentials -->
    <div style="background:var(--accent-dim);border:1px solid rgba(0,212,255,0.2);border-radius:8px;padding:12px 16px;margin-bottom:20px">
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:8px">🔑 Demo tài khoản:</p>
      <button onclick="fillDemo('user')" style="background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text-secondary);cursor:pointer;margin-right:8px">👤 User</button>
      <button onclick="fillDemo('admin')" style="background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text-secondary);cursor:pointer">⚙️ Admin</button>
    </div>

    <div class="auth-footer">
      Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>

<script src="/js/login.js"></script>
</body>
</html>
