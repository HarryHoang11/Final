<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Chi tiết sản phẩm - TechStore</title>

  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a href="/" class="navbar-brand">
        <i class="bi bi-lightning-charge-fill text-warning me-2"></i>
        Tech<span class="fw-bold">Store</span>
      </a>
      <a href="/products" class="btn btn-outline-light ms-auto">
        <i class="bi bi-arrow-left me-1"></i> Quay lại cửa hàng
      </a>
    </div>
  </nav>

  <div class="container py-5">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
        <li class="breadcrumb-item"><a href="/products">Sản phẩm</a></li>
        <li class="breadcrumb-item active" id="breadcrumb-name">Chi tiết sản phẩm</li>
      </ol>
    </nav>

    <!-- Loading -->
    <div id="product-loading" class="text-center py-5">
      <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
      <p class="mt-3 text-muted">Đang tải thông tin sản phẩm...</p>
    </div>

    <!-- Product Detail -->
    <div id="product-detail" class="row g-5 align-items-start" style="display: none;">

      <!-- Image Column -->
      <div class="col-lg-6">
        <div id="product-image-container" class="rounded-4 overflow-hidden shadow bg-light ratio ratio-1x1">
          <div id="product-img-placeholder" class="d-flex align-items-center justify-content-center h-100"
            style="font-size: 6rem; background: var(--bg-secondary);">
            📦
          </div>
        </div>
      </div>

      <!-- Info Column -->
      <div class="col-lg-6">
        <div id="product-category" class="badge bg-primary fs-6 mb-3"></div>

        <h1 id="product-name" class="display-5 fw-bold mb-3"></h1>
        <h2 id="product-price" class="text-primary mb-4"></h2>

        <div id="product-stock" class="mb-4 fs-5"></div>

        <div id="product-description" class="lead text-muted mb-5"></div>

        <div class="d-grid gap-3 mb-4">
          <button id="add-to-cart-btn" onclick="addToCartDetail()" class="btn btn-primary btn-lg py-3">
            <i class="bi bi-cart-plus me-2"></i> Thêm vào giỏ hàng
          </button>
          <button onclick="window.location.href='/cart'" class="btn btn-outline-secondary btn-lg py-3">
            <i class="bi bi-bag-check me-2"></i> Xem giỏ hàng
          </button>
        </div>

        <!-- Features -->
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <div class="row text-center">
              <div class="col-4">
                <i class="bi bi-truck fs-3 text-success"></i>
                <p class="small mt-2 mb-0">Giao hàng nhanh<br><strong>2-4 giờ</strong></p>
              </div>
              <div class="col-4">
                <i class="bi bi-shield-check fs-3 text-success"></i>
                <p class="small mt-2 mb-0">Bảo hành<br><strong>chính hãng</strong></p>
              </div>
              <div class="col-4">
                <i class="bi bi-arrow-repeat fs-3 text-success"></i>
                <p class="small mt-2 mb-0">Đổi trả<br><strong>30 ngày</strong></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Error -->
    <div id="product-error" class="text-center py-5 d-none">
      <i class="bi bi-emoji-frown display-1 text-muted mb-4"></i>
      <h3>Không tìm thấy sản phẩm</h3>
      <p class="text-muted">Sản phẩm này có thể đã bị xóa hoặc không tồn tại.</p>
      <a href="/products" class="btn btn-primary btn-lg mt-3">
        ← Quay lại cửa hàng
      </a>
    </div>
  </div>

  <!-- CHATBOX -->
  <div id="chatbox-container"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/chatbox.js"></script>

  <script>
    let currentProduct = null;

    async function loadProduct() {
      const pathParts = window.location.pathname.split('/');
      const productId = pathParts[pathParts.length - 1];

      if (!productId) {
        showError();
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/products/${productId}`);
        if (!res.ok) { showError(); return; }

        currentProduct = await res.json();
        renderProduct(currentProduct);

      } catch (err) {
        showError();
      }
    }

    function renderProduct(p) {
      document.getElementById('product-loading').style.display = 'none';
      document.getElementById('product-detail').style.display = 'grid';

      const catLabel = CATEGORY_LABELS[p.category] || p.category;
      const catIcon = CATEGORY_ICONS[p.category] || '📦';

      document.title = `${p.name} - TechStore`;
      document.getElementById('breadcrumb-name').textContent = p.name;
      document.getElementById('product-category').textContent = `${catIcon} ${catLabel}`;
      document.getElementById('product-name').textContent = p.name;
      document.getElementById('product-price').textContent = formatPrice(p.price);
      document.getElementById('product-description').textContent = p.description || 'Không có mô tả chi tiết.';

      const stock = p.stock || 0;
      document.getElementById('product-stock').innerHTML = stock > 0
        ? `<span style="color:var(--success)">✅ Còn hàng (${stock} cái)</span>`
        : `<span style="color:var(--danger)">❌ Hết hàng</span>`;

      if (p.imageUrl) {
        document.getElementById('product-image-container').innerHTML =
          `<img src="${p.imageUrl}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover">`;
      } else {
        document.getElementById('product-img-placeholder').style.display = 'flex';
        document.getElementById('product-img-placeholder').textContent = catIcon;
      }
    }

    function addToCartDetail() {
      if (!currentProduct) return;
      addToCart(currentProduct.id, currentProduct.name, currentProduct.price, currentProduct.imageUrl || '');
    }

    function showError() {
      document.getElementById('product-loading').style.display = 'none';
      document.getElementById('product-error').classList.remove('hidden');
    }

    document.addEventListener('DOMContentLoaded', loadProduct);
  </script>
</body>

</html>
