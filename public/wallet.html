<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ví Điện Tử - TechStore</title>
  
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .wallet-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 16px;
    }
    .balance {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -1px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a href="/" class="navbar-brand">
      <i class="bi bi-lightning-charge-fill text-warning me-2"></i>Tech<span class="fw-bold">Store</span>
    </a>
    <div class="navbar-nav ms-auto">
      <a href="/wallet" class="nav-link active"><i class="bi bi-wallet2 me-1"></i>Ví của tôi</a>
      <a href="/cart" class="nav-link"><i class="bi bi-cart3 me-1"></i>Giỏ hàng</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="row">
    <!-- Wallet Balance -->
    <div class="col-lg-8">
      <div class="wallet-card p-5 mb-4 text-center">
        <h5 class="opacity-75 mb-2">Số dư hiện tại</h5>
        <div class="balance" id="balance">0 ₫</div>
        <small class="opacity-75">Cập nhật lúc: <span id="last-updated">Vừa xong</span></small>
      </div>

      <!-- Quick Actions -->
      <div class="row g-3 mb-5">
        <div class="col-md-4">
          <button onclick="showDepositModal()" class="btn btn-success w-100 py-3">
            <i class="bi bi-plus-circle fs-3"></i><br>Nạp tiền
          </button>
        </div>
        <div class="col-md-4">
          <button onclick="showTransferModal()" class="btn btn-primary w-100 py-3">
            <i class="bi bi-arrow-left-right fs-3"></i><br>Chuyển tiền
          </button>
        </div>
        <div class="col-md-4">
          <button onclick="showWithdrawModal()" class="btn btn-warning w-100 py-3">
            <i class="bi bi-cash-stack fs-3"></i><br>Rút tiền
          </button>
        </div>
      </div>

      <!-- Transaction History -->
      <h4 class="mb-3"><i class="bi bi-clock-history"></i> Lịch sử giao dịch</h4>
      <div class="card">
        <div class="card-body p-0">
          <div id="transaction-list" class="list-group list-group-flush">
            <!-- JS sẽ render vào đây -->
          </div>
        </div>
      </div>
    </div>

    <!-- Side Info -->
    <div class="col-lg-4">
      <div class="card mb-4">
        <div class="card-body">
          <h5><i class="bi bi-info-circle"></i> Thông tin ví</h5>
          <hr>
          <p><strong>Số ví:</strong> <span id="wallet-id">TSW-XXXXXXXX</span></p>
          <p><strong>Trạng thái:</strong> <span class="badge bg-success">Hoạt động</span></p>
          <p><strong>Ngày tạo:</strong> 01/04/2025</p>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <h5><i class="bi bi-shield-check"></i> Bảo mật</h5>
          <ul class="list-unstyled">
            <li class="mb-2"><i class="bi bi-check-circle text-success"></i> Xác thực 2 lớp</li>
            <li class="mb-2"><i class="bi bi-check-circle text-success"></i> Mã PIN 6 số</li>
            <li><i class="bi bi-check-circle text-success"></i> Giới hạn giao dịch an toàn</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modals -->
<!-- Nạp tiền Modal -->
<div class="modal fade" id="depositModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nạp tiền vào ví</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="form-group mb-3">
          <label>Số tiền nạp (VNĐ)</label>
          <input type="number" class="form-control" id="deposit-amount" placeholder="100000" value="500000">
        </div>
        <small class="text-muted">Hỗ trợ: Momo, VNPAY, Thẻ ngân hàng</small>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-success" onclick="processDeposit()">Nạp ngay</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>

<script src="/js/app.js"></script>


<script>
  let currentBalance = 0;

  async function loadWallet() {
    if (!window.currentUser) {
      showToast("Vui lòng đăng nhập để xem ví", "error");
      setTimeout(() => window.location.href = '/login', 1500);
      return;
    }

    try {
      const data = await apiCall('GET', '/wallet');
      currentBalance = data.balance || 0;

      document.getElementById('balance').textContent = currentBalance.toLocaleString('vi-VN') + ' ₫';
      document.getElementById('wallet-id').textContent = `TSW-${window.currentUser.uid.slice(0,8).toUpperCase()}`;

      // Render lịch sử giao dịch
      const list = document.getElementById('transaction-list');
      if (data.transactions && data.transactions.length > 0) {
        list.innerHTML = data.transactions.map(t => `
          <div class="list-group-item d-flex justify-content-between align-items-center">
            <div>
              <strong>${t.description || 'Giao dịch'}</strong><br>
              <small class="text-muted">${t.timestamp?.toDate ? t.timestamp.toDate().toLocaleDateString('vi-VN') : 'Gần đây'}</small>
            </div>
            <span class="${t.type === 'deposit' ? 'text-success' : 'text-danger'} fw-bold">
              ${t.type === 'deposit' ? '+' : ''}${t.amount.toLocaleString('vi-VN')} ₫
            </span>
          </div>
        `).join('');
      } else {
        list.innerHTML = `<div class="list-group-item text-center text-muted">Chưa có giao dịch nào</div>`;
      }
    } catch (err) {
      console.error(err);
      showToast("Không thể tải thông tin ví", "error");
    }
  }

  async function processDeposit() {
    const amountInput = document.getElementById('deposit-amount');
    const amount = parseInt(amountInput.value);

    if (!amount || amount < 10000) {
      showToast("Số tiền tối thiểu là 10.000 ₫", "error");
      return;
    }

    try {
      const result = await apiCall('POST', '/wallet/deposit', { amount });
      showToast(result.message || "Nạp tiền thành công!", "success");

      // Cập nhật lại ví
      loadWallet();

      // Đóng modal
      bootstrap.Modal.getInstance(document.getElementById('depositModal')).hide();
      amountInput.value = 500000;
    } catch (err) {
      showToast("Nạp tiền thất bại: " + err.message, "error");
    }
  }

  // Khởi tạo
  document.addEventListener('DOMContentLoaded', () => {
    requireAuth();           // Yêu cầu đăng nhập
    setTimeout(loadWallet, 800);
  });
</script>
</body>
</html>
