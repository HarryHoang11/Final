<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - TechStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <div class="brand-icon">⚡</div>
    Tech<span>Store</span>
  </a>
  <div class="navbar-actions">
    <a href="/login" class="btn-nav-auth" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary)">Đăng nhập</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div style="font-size:48px;margin-bottom:12px">🚀</div>
      <h1>Tạo tài khoản</h1>
      <p>Đăng ký để bắt đầu mua sắm</p>
    </div>

    <div id="error-msg" class="hidden" style="background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);border-radius:8px;padding:12px 16px;font-size:14px;color:var(--danger);margin-bottom:20px"></div>

    <div class="form-group">
      <label class="form-label">Họ và tên</label>
      <input type="text" class="form-control" id="display-name" placeholder="Nguyễn Văn A">
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="email" placeholder="your@email.com">
    </div>

    <div class="form-group">
      <label class="form-label">Mật khẩu</label>
      <div style="position:relative">
        <input type="password" class="form-control" id="password" placeholder="Ít nhất 6 ký tự">
        <button onclick="togglePwd('password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px">👁</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Xác nhận mật khẩu</label>
      <input type="password" class="form-control" id="confirm-password" placeholder="Nhập lại mật khẩu"
        onkeydown="if(event.key==='Enter') doRegister()">
    </div>

    <div style="margin-bottom:20px">
      <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
        <input type="checkbox" id="agree-terms" style="margin-top:3px;accent-color:var(--accent)">
        <span style="font-size:13px;color:var(--text-secondary)">Tôi đồng ý với <a href="#" style="color:var(--accent)">Điều khoản dịch vụ</a> và <a href="#" style="color:var(--accent)">Chính sách bảo mật</a></span>
      </label>
    </div>

    <div style="display:grid;gap:10px;margin-bottom:18px">
      <button onclick="doSignInGoogle()" type="button" style="
        display:flex;align-items:center;justify-content:center;gap:10px;
        width:100%;padding:11px 16px;border-radius:9px;cursor:pointer;
        background:#fff;border:1.5px solid #dadce0;color:#3c4043;
        font-size:14px;font-weight:500;transition:box-shadow 0.2s;
      " onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,0.2)'"
         onmouseout="this.style.boxShadow='none'">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Đăng ký bằng Google
      </button>
      <button onclick="doSignInFacebook()" type="button" style="
        display:flex;align-items:center;justify-content:center;gap:10px;
        width:100%;padding:11px 16px;border-radius:9px;cursor:pointer;
        background:#1877f2;border:none;color:#fff;
        font-size:14px;font-weight:500;transition:opacity 0.2s;
      " onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Đăng ký bằng Facebook
      </button>
    </div>

    <button class="btn btn-primary btn-full" id="register-btn" onclick="doRegister()">
      Đăng ký
    </button>

    <div class="auth-footer" style="margin-top:20px">
      Đã có tài khoản? <a href="/login">Đăng nhập</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>

<script>
  async function doRegister() {
    const name = document.getElementById('display-name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;
    const agree = document.getElementById('agree-terms').checked;
    const btn = document.getElementById('register-btn');

    if (!name || !email || !password || !confirm) {
      showError('Vui lòng nhập đầy đủ thông tin');
      return;
    }

    if (password !== confirm) {
      showError('Mật khẩu xác nhận không khớp');
      return;
    }

    if (password.length < 6) {
      showError('Mật khẩu phải có ít nhất 6 ký tự');
      return;
    }

    if (!agree) {
      showError('Vui lòng đồng ý với điều khoản dịch vụ');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Đang tạo tài khoản...';
    document.getElementById('error-msg').classList.add('hidden');

    try {
      await signUp(email, password, name);
      showToast('Đăng ký thành công! Chào mừng ' + name, 'success');
      setTimeout(() => window.location.href = '/', 1000);
    } catch (err) {
      const msgs = {
        'auth/email-already-in-use': 'Email này đã được sử dụng',
        'auth/invalid-email': 'Email không hợp lệ',
        'auth/weak-password': 'Mật khẩu quá yếu'
      };
      showError(msgs[err.code] || err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Đăng ký';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = '⚠️ ' + msg;
    el.classList.remove('hidden');
  }

  function togglePwd(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  async function doSignInGoogle() {
    try {
      document.getElementById('register-btn').disabled = true;
      await signInWithGoogle();
      showToast('Đăng nhập bằng Google thành công!', 'success');
      window.location.href = '/';
    } catch (err) {
      showError(err.message || 'Lỗi đăng nhập Google');
    } finally {
      document.getElementById('register-btn').disabled = false;
    }
  }

  async function doSignInFacebook() {
    try {
      document.getElementById('register-btn').disabled = true;
      await signInWithFacebook();
      showToast('Đăng nhập bằng Facebook thành công!', 'success');
      window.location.href = '/';
    } catch (err) {
      showError(err.message || 'Lỗi đăng nhập Facebook');
    } finally {
      document.getElementById('register-btn').disabled = false;
    }
  }
</script>
</body>
</html>
