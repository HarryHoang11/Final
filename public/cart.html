<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giỏ hàng - TechStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a href="/" class="navbar-brand">
      <i class="bi bi-lightning-charge-fill text-warning me-2"></i>
      Tech<span class="fw-bold">Store</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a href="/" class="nav-link">Trang chủ</a></li>
        <li class="nav-item"><a href="/products" class="nav-link">Sản phẩm</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3" id="navbar-auth"></div>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="display-5 fw-bold">🛒 Giỏ hàng của bạn</h1>
    <span id="total-items" class="badge bg-primary fs-6 px-3 py-2">0 sản phẩm</span>
  </div>

  <!-- FIX: use d-none consistently with Bootstrap; cart.js now handles d-none class -->
  <div id="cart-empty" class="text-center py-5 d-none">
    <i class="bi bi-cart3 display-1 text-muted mb-4 d-block"></i>
    <h3>Giỏ hàng trống</h3>
    <p class="text-muted mb-4">Bạn chưa có sản phẩm nào trong giỏ hàng</p>
    <a href="/products" class="btn btn-primary btn-lg px-5">
      <i class="bi bi-shop me-2"></i>Tiếp tục mua sắm
    </a>
  </div>

  <div id="cart-content">
    <div class="row g-4">
      <!-- Cart Items -->
      <div class="col-lg-8">
        <div id="cart-items-container"></div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-outline-danger btn-sm" onclick="clearCart()">
            🗑️ Xóa tất cả
          </button>
          <a href="/products" class="btn btn-outline-secondary btn-sm">
            ← Tiếp tục mua sắm
          </a>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="col-lg-4">
        <div class="card shadow-sm sticky-top" style="top:20px;background:#1f2937;color:white;border:1px solid #374151">
          <div class="card-header" style="background:#111827;border-bottom:1px solid #374151">
            <h5 class="mb-0">Tóm tắt đơn hàng</h5>
          </div>
          <div class="card-body">
            <div class="d-flex justify-content-between mb-2">
              <span>Tạm tính</span>
              <span id="subtotal">0 ₫</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <span>Phí vận chuyển</span>
              <!-- FIX: shipping element for dynamic update -->
              <span id="shipping" class="text-success">30.000 ₫</span>
            </div>
            <hr style="border-color:#374151">
            <div class="d-flex justify-content-between fs-5 fw-bold">
              <span>Tổng cộng</span>
              <span id="total" class="text-primary">0 ₫</span>
            </div>
          </div>
          <div class="card-footer" style="background:#111827;border-top:1px solid #374151;padding:20px 16px">
            <button onclick="checkout()" class="btn btn-primary btn-lg w-100 py-3">
              <i class="bi bi-credit-card me-2"></i>Đặt hàng ngay
            </button>
            <a href="/products" class="btn btn-outline-light w-100 mt-3">Tiếp tục mua sắm</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/cart.js"></script>

<script>
  function clearCart() {
    if (confirm('Bạn có chắc muốn xóa toàn bộ giỏ hàng?')) {
      cartItems = [];
      saveCart();
      renderCart();
      showToast('Đã xóa toàn bộ giỏ hàng', 'info');
    }
  }
</script>
</body>
</html>
