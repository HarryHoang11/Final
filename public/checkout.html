<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh toán - TechStore</title>
  
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a href="/" class="navbar-brand">
      <i class="bi bi-lightning-charge-fill text-warning me-2"></i>
      Tech<span class="fw-bold">Store</span>
    </a>
    <a href="/cart" class="btn btn-outline-light ms-auto">
      <i class="bi bi-arrow-left me-1"></i> Quay lại giỏ hàng
    </a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <h1 class="mb-4 fw-bold">Thanh toán đơn hàng</h1>

      <div class="row g-5">
        
        <!-- Form thông tin giao hàng -->
        <div class="col-lg-7">
          <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
              <h5 class="mb-0"><i class="bi bi-geo-alt"></i> Thông tin giao hàng</h5>
            </div>
            <div class="card-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="fullName" placeholder="Nguyễn Văn A" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                  <input type="tel" class="form-control" id="phone" placeholder="0123456789" required>
                </div>
              </div>

              <div class="mt-3">
                <label class="form-label">Địa chỉ nhận hàng <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="address" placeholder="Số nhà, đường, phường/xã" required>
              </div>

              <div class="row g-3 mt-3">
                <div class="col-md-6">
                  <label class="form-label">Tỉnh/Thành phố</label>
                  <input type="text" class="form-control" id="city" value="Hồ Chí Minh">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Quận/Huyện</label>
                  <input type="text" class="form-control" id="district" placeholder="Quận 1">
                </div>
              </div>
            </div>
          </div>

          <!-- Phương thức thanh toán -->
          <div class="card shadow-sm mt-4">
            <div class="card-header bg-white py-3">
              <h5 class="mb-0"><i class="bi bi-credit-card"></i> Phương thức thanh toán</h5>
            </div>
            <div class="card-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <div onclick="selectPayment(this)" data-method="cod" class="payment-option active border p-3 rounded-3 text-center cursor-pointer">
                    <i class="bi bi-cash-stack fs-3 text-success"></i>
                    <p class="mb-0 mt-2 fw-medium">Thanh toán khi nhận hàng (COD)</p>
                  </div>
                </div>
                <div class="col-md-6">
                  <div onclick="selectPayment(this)" data-method="bank" class="payment-option border p-3 rounded-3 text-center cursor-pointer">
                    <i class="bi bi-bank fs-3"></i>
                    <p class="mb-0 mt-2 fw-medium">Chuyển khoản ngân hàng</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Order Summary -->
        <div class="col-lg-5">
          <div class="card shadow-sm sticky-top" style="top: 20px;">
            <div class="card-header bg-white">
              <h5 class="mb-0">Tóm tắt đơn hàng</h5>
            </div>
            <div class="card-body">
              <div id="order-items" class="mb-4">
                <!-- JS render sản phẩm ở đây -->
              </div>

              <hr>
              <div class="d-flex justify-content-between mb-2">
                <span>Tạm tính</span>
                <span id="subtotal">0 ₫</span>
              </div>
              <div class="d-flex justify-content-between mb-3">
                <span>Phí vận chuyển</span>
                <span class="text-success">30.000 ₫</span>
              </div>
              <div class="d-flex justify-content-between fs-5 fw-bold">
                <span>Tổng thanh toán</span>
                <span id="total" class="text-primary">0 ₫</span>
              </div>
            </div>

            <div class="card-footer bg-white p-4">
              <button onclick="processCheckout()" class="btn btn-primary btn-lg w-100 py-3">
                <i class="bi bi-check-circle me-2"></i> Hoàn tất thanh toán
              </button>
              <p class="text-center text-muted small mt-3 mb-0">🔒 Thanh toán an toàn với TechStore</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Scripts của bạn -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/cart.js"></script>

<script>
  let currentPaymentMethod = 'cod';

  function selectPayment(el) {
    document.querySelectorAll('.payment-option').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    currentPaymentMethod = el.dataset.method;
  }

  async function processCheckout() {
    if (!window.currentUser) {
      showToast("Vui lòng đăng nhập để thanh toán", "error");
      return;
    }

    const fullName = document.getElementById('fullName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();

    if (!fullName || !phone || !address) {
      showToast("Vui lòng nhập đầy đủ thông tin giao hàng", "error");
      return;
    }

    if (cartItems.length === 0) {
      showToast("Giỏ hàng trống!", "error");
      return;
    }

    const total = cartItems.reduce((sum, i) => sum + (i.price * i.qty), 0) + 30000;

    try {
      await apiCall('POST', '/orders', {
        products: cartItems,
        total: total,
        shippingAddress: `${fullName} | ${phone} | ${address}, ${document.getElementById('district').value}, ${document.getElementById('city').value}`,
        paymentMethod: currentPaymentMethod
      });

      // Xóa giỏ hàng sau khi đặt thành công
      cartItems = [];
      saveLocalCart([]);

      showToast("🎉 Đặt hàng thành công! Cảm ơn bạn.", "success");

      setTimeout(() => {
        window.location.href = '/';
      }, 2000);

    } catch (err) {
      showToast("Có lỗi xảy ra: " + err.message, "error");
    }
  }

  // Load giỏ hàng khi vào trang
  document.addEventListener('DOMContentLoaded', () => {
    initCart();

    // Render sản phẩm trong tóm tắt đơn hàng
    const container = document.getElementById('order-items');
    container.innerHTML = cartItems.map(item => `
      <div class="d-flex justify-content-between mb-3">
        <div>
          <strong>${item.name}</strong> <span class="text-muted">x${item.qty}</span>
        </div>
        <div>${formatPrice(item.price * item.qty)}</div>
      </div>
    `).join('');
  });
</script>
</body>
</html>
